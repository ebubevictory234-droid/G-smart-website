<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Smart Super Stores | Official Page</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary-purple: #6d28d9;
            --primary-dark: #2e1065;
            --accent-gold: #fbbf24;
            --accent-gold-hover: #f59e0b;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.92);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #ddd6fe 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        /* --- Luxury Header --- */
        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-purple) 100%);
            color: var(--text-light);
            padding: 8rem 2rem 10rem 2rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0% 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            margin-bottom: 0.5rem;
        }

        .tagline {
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* --- Main Layout --- */
        .wrapper {
            max-width: 1100px;
            margin: -100px auto 60px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 0;
            padding: 0 2rem;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        /* --- Info Section --- */
        .info-section {
            background: var(--primary-purple);
            color: white;
            padding: 4rem;
            border-radius: 30px 0 0 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .contact-detail i {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.2rem;
            color: var(--accent-gold);
            font-size: 1.2rem;
        }

        /* --- Form Section --- */
        .form-section {
            background: var(--glass-bg);
            padding: 4rem;
            border-radius: 0 30px 30px 0;
            backdrop-filter: blur(10px);
        }

        .form-section h3 {
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin-bottom: 2rem;
        }

        .input-box {
            margin-bottom: 1.5rem;
        }

        .input-box label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .input-box input, .input-box textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            background: white;
        }

        .input-box input:focus, .input-box textarea:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 15px rgba(109, 40, 217, 0.1);
        }

        /* --- Luxury Button --- */
        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            border: none;
            border-radius: 12px;
            color: #451a03;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5);
        }

        #status {
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 600;
            display: none;
            padding: 1rem;
            border-radius: 10px;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 968px) {
            .wrapper { grid-template-columns: 1fr; }
            .info-section { border-radius: 30px 30px 0 0; padding: 3rem; }
            .form-section { border-radius: 0 0 30px 30px; padding: 3rem; }
            .logo { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">G-SMART</div>
        <div class="tagline">Super Stores | Premium Quality. Smart Living.</div>
    </header>

    <div class="wrapper">
        <div class="info-section">
            <h2>Let's Connect <br> With Our Team</h2>
            <p style="margin-bottom: 3rem; opacity: 0.8;">Experience world-class service. Whether you have a question about our products or need assistance with an order, we are here for you.</p>
            
            <div class="contact-detail">
                <i class="fas fa-map-marker-alt"></i>
                <span>172 Ibrahim Taiwo Road</span>
            </div>
            <div class="contact-detail">
                <i class="fas fa-phone-alt"></i>
                <span>07034122666</span>
            </div>
            <div class="contact-detail">
                <i class="fas fa-envelope"></i>
                <span>ebubevictory234@gmail.com</span>
            </div>
        </div>

        <div class="form-section">
            <h3>Send a Message</h3>
            <form id="contact-form">
                <div class="input-box">
                    <label>Your Name</label>
                    <input type="text" name="from_name" placeholder="John Doe" required>
                </div>
                <div class="input-box">
                    <label>Email Address</label>
                    <input type="email" name="reply_to" placeholder="john@example.com" required>
                </div>
                <div class="input-box">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="How can we help you today?" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="btn-text">Submit Inquiry</button>
                <div id="status"></div>
            </form>
        </div>
    </div>

    <script>
        // REPLACE THESE with your actual keys from EmailJS
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        const form = document.getElementById('contact-form');
        const btn = document.getElementById('btn-text');
        const statusDiv = document.getElementById('status');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            // Replace with your Service ID and Template ID
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => {
                    statusDiv.style.display = "block";
                    statusDiv.style.background = "#d1fae5";
                    statusDiv.style.color = "#065f46";
                    statusDiv.innerText = "Message Sent Successfully!";
                    btn.innerText = "Submit Inquiry";
                    btn.disabled = false;
                    form.reset();
                }, (error) => {
                    statusDiv.style.display = "block";
                    statusDiv.style.background = "#fee2e2";
                    statusDiv.style.color = "#991b1b";
                    statusDiv.innerText = "Failed to send. Please try again.";
                    btn.innerText = "Submit Inquiry";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
